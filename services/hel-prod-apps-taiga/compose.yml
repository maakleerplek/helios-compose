services:
  hel-prod-apps-taiga-db:
    image: postgres:15-alpine
    container_name: hel-prod-apps-taiga-db
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      TZ: 'Europe/Brussels'
      POSTGRES_DB: ${TAIGA_DB_NAME}
      POSTGRES_USER: ${TAIGA_DB_USER}
      POSTGRES_PASSWORD: ${TAIGA_DB_PASSWORD}
    volumes:
      - /var/lib/docker-compose/hel-prod-apps-taiga-db:/var/lib/postgresql/data
    networks:
      - taiga

  hel-prod-apps-taiga-rabbitmq:
    image: rabbitmq:3.12-alpine
    container_name: hel-prod-apps-taiga-rabbitmq
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      TZ: 'Europe/Brussels'
      RABBITMQ_DEFAULT_USER: ${TAIGA_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${TAIGA_RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: taiga
    volumes:
      - /var/lib/docker-compose/hel-prod-apps-taiga-rabbitmq:/var/lib/rabbitmq
    networks:
      - taiga

  hel-prod-apps-taiga-back:
    image: taigaio/taiga-back:latest
    container_name: hel-prod-apps-taiga-back
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
      POSTGRES_DB: ${TAIGA_DB_NAME}
      POSTGRES_USER: ${TAIGA_DB_USER}
      POSTGRES_PASSWORD: ${TAIGA_DB_PASSWORD}
      POSTGRES_HOST: hel-prod-apps-taiga-db
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_DOMAIN: ${TAIGA_DOMAIN}
      TAIGA_SITES_SCHEME: https
      TAIGA_SUBPATH: ""
      ENABLE_TELEMETRY: "False"
      EVENTS_PUSH_BACKEND: "taiga_contrib_rabbit_backend.rabbit.EventsPushBackend"
      EVENTS_PUSH_BACKEND_URL: "amqp://${TAIGA_RABBITMQ_USER}:${TAIGA_RABBITMQ_PASS}@hel-prod-apps-taiga-rabbitmq/taiga"
      CELERY_BROKER_URL: "amqp://${TAIGA_RABBITMQ_USER}:${TAIGA_RABBITMQ_PASS}@hel-prod-apps-taiga-rabbitmq/taiga"
    volumes:
      - /var/lib/docker-compose/hel-prod-apps-taiga-static:/taiga-back/static
      - /var/lib/docker-compose/hel-prod-apps-taiga-media:/taiga-back/media
    networks:
      - taiga
    depends_on:
      - hel-prod-apps-taiga-db
      - hel-prod-apps-taiga-rabbitmq

  hel-prod-apps-taiga-async:
    image: taigaio/taiga-back:latest
    container_name: hel-prod-apps-taiga-async
    restart: unless-stopped
    entrypoint: ["/taiga-back/docker/async_entrypoint.sh"]
    environment:
      TZ: 'Europe/Brussels'
      POSTGRES_DB: ${TAIGA_DB_NAME}
      POSTGRES_USER: ${TAIGA_DB_USER}
      POSTGRES_PASSWORD: ${TAIGA_DB_PASSWORD}
      POSTGRES_HOST: hel-prod-apps-taiga-db
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_DOMAIN: ${TAIGA_DOMAIN}
      TAIGA_SITES_SCHEME: https
      ENABLE_TELEMETRY: "False"
      CELERY_BROKER_URL: "amqp://${TAIGA_RABBITMQ_USER}:${TAIGA_RABBITMQ_PASS}@hel-prod-apps-taiga-rabbitmq/taiga"
    volumes:
      - /var/lib/docker-compose/hel-prod-apps-taiga-static:/taiga-back/static
      - /var/lib/docker-compose/hel-prod-apps-taiga-media:/taiga-back/media
    networks:
      - taiga
    depends_on:
      - hel-prod-apps-taiga-db
      - hel-prod-apps-taiga-rabbitmq
      - hel-prod-apps-taiga-back

  hel-prod-apps-taiga-front:
    image: taigaio/taiga-front:latest
    container_name: hel-prod-apps-taiga-front
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
      TAIGA_URL: "https://${TAIGA_DOMAIN}"
      TAIGA_WEBSOCKETS_URL: "wss://${TAIGA_DOMAIN}"
      TAIGA_SUBPATH: ""
      ENABLE_TELEMETRY: "False"
    networks:
      - taiga

  hel-prod-apps-taiga-events:
    image: taigaio/taiga-events:latest
    container_name: hel-prod-apps-taiga-events
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
      RABBITMQ_URL: "amqp://${TAIGA_RABBITMQ_USER}:${TAIGA_RABBITMQ_PASS}@hel-prod-apps-taiga-rabbitmq/taiga"
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
    networks:
      - taiga
    depends_on:
      - hel-prod-apps-taiga-rabbitmq

  hel-prod-apps-taiga-protected:
    image: taigaio/taiga-protected:latest
    container_name: hel-prod-apps-taiga-protected
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
      SECRET_KEY: ${TAIGA_SECRET_KEY}
      MAX_AGE: 360
    networks:
      - taiga

  hel-prod-apps-taiga-gateway:
    image: nginx:1.25-alpine
    container_name: hel-prod-apps-taiga-gateway
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/lib/docker-compose/hel-prod-apps-taiga-static:/taiga/static:ro
      - /var/lib/docker-compose/hel-prod-apps-taiga-media:/taiga/media:ro
    ports:
      - "8083:80"
    networks:
      - taiga
    depends_on:
      - hel-prod-apps-taiga-front
      - hel-prod-apps-taiga-back
      - hel-prod-apps-taiga-events
      - hel-prod-apps-taiga-protected

networks:
  taiga:
    name: hel-prod-taiga
    driver: bridge
