services:
  hel-prod-mon-prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hel-prod-mon-prometheus
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /var/lib/docker-compose/hel-prod-mon-prometheus:/prometheus
    networks:
      - mon
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  hel-prod-mon-node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: hel-prod-mon-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - 9100
    networks:
      - mon

  hel-prod-mon-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: hel-prod-mon-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    expose:
      - 8080
    networks:
      - mon

  hel-prod-mon-grafana:
    image: grafana/grafana:13.0.1
    container_name: hel-prod-mon-grafana
    restart: unless-stopped
    environment:
      TZ: 'Europe/Brussels'
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - /var/lib/docker-compose/hel-prod-mon-grafana:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - mon
    depends_on:
      - hel-prod-mon-prometheus

networks:
  mon:
    name: hel-prod-mon
    driver: bridge
